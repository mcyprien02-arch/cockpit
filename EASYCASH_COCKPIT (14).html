<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--surfaceAlt:#222632;--border:#2a2e3a;--accent:#00d4aa;--accentDim:rgba(0,212,170,0.12);--accentGlow:rgba(0,212,170,0.25);--danger:#ff4d6a;--dangerDim:rgba(255,77,106,0.12);--dangerGlow:rgba(255,77,106,0.2);--warn:#ffb347;--warnDim:rgba(255,179,71,0.12);--warnGlow:rgba(255,179,71,0.2);--ok:#00d4aa;--blue:#4da6ff;--purple:#a78bfa;--text:#e8eaed;--textMuted:#8b8fa3;--textDim:#555a6e}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#0f1117}
.logo span{font-size:17px;font-weight:600;letter-spacing:-0.02em}
.logo small{font-size:11px;color:var(--textDim);background:var(--surfaceAlt);padding:2px 8px;border-radius:4px;margin-left:4px}
.hdr-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hdr-r select{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surfaceAlt);color:var(--text);font-size:13px;font-family:inherit}
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-ac{background:var(--accent);color:var(--bg)}.btn-s{background:var(--surfaceAlt);color:var(--text)}.btn-s:hover{background:var(--border)}.btn-d{background:var(--dangerDim);color:var(--danger)}
.nav{display:flex;gap:2px;padding:8px 24px;background:var(--bg);overflow-x:auto}
.nav-btn{padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--textMuted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit;display:flex;align-items:center;gap:6px}
.nav-btn:hover{background:var(--surfaceAlt)}.nav-btn.active{background:var(--accentDim);color:var(--accent)}
.content{padding:16px 24px;min-height:60vh}
.section{display:none}.section.active{display:block}
.card{background:var(--surface);border-radius:12px;padding:16px 20px;border:1px solid var(--border);margin-bottom:12px}
.glow-ok{box-shadow:0 0 20px var(--accentGlow)}.glow-wn{box-shadow:0 0 20px var(--warnGlow)}.glow-dg{box-shadow:0 0 20px var(--dangerGlow)}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.grid-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.metric-label{font-size:11px;color:var(--textMuted);margin-bottom:4px}.metric-value{font-size:26px;font-weight:700}.metric-sub{font-size:12px;color:var(--textMuted)}
.strip{background:var(--surfaceAlt);border-radius:8px;padding:10px 12px}.strip-label{font-size:10px;color:var(--textMuted);margin-bottom:2px}.strip-value{font-size:18px;font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}.dot-ok{background:var(--ok);box-shadow:0 0 8px var(--accentGlow)}.dot-wn{background:var(--warn);box-shadow:0 0 8px var(--warnGlow)}.dot-dg{background:var(--danger);box-shadow:0 0 8px var(--dangerGlow)}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;display:inline-block}.b-ok{background:var(--accentDim);color:var(--accent)}.b-wn{background:var(--warnDim);color:var(--warn)}.b-dg{background:var(--dangerDim);color:var(--danger)}
.bp1{background:var(--dangerDim);color:var(--danger);font-weight:700;font-size:10px;padding:3px 8px;border-radius:4px}.bp2{background:var(--warnDim);color:var(--warn);font-weight:700;font-size:10px;padding:3px 8px;border-radius:4px}
.action-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)}.action-row:last-child{border-bottom:none}
.chart-wrap{position:relative;width:100%;height:220px}
.stitle{font-size:14px;font-weight:600;margin-bottom:10px}
svg.gauge{display:block;margin:0 auto}.gauge-label{text-align:center;font-size:11px;color:var(--textMuted);margin-top:-4px}
.chk-group{border-top:3px solid;border-radius:12px;background:var(--surface);padding:16px 20px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);border-left:1px solid var(--border)}
.chk-group label{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px}.chk-group label:last-child{border-bottom:none}.chk-group label.done{color:var(--textDim);text-decoration:line-through}
.chk-group input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.pill{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block}.p-gc{background:rgba(139,143,163,.15);color:#8b8fa3}.p-rd{background:rgba(255,77,106,.15);color:#ff4d6a}.p-gf{background:rgba(255,179,71,.15);color:#ffb347}.p-ps{background:rgba(0,212,170,.15);color:#00d4aa}.p-pd{background:rgba(167,139,250,.15);color:#a78bfa}
.time-table{width:100%;border-collapse:collapse;font-size:12px}.time-table th{padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);color:var(--textMuted);font-weight:500;font-size:11px}.time-table td{padding:6px 10px;border-bottom:1px solid var(--border)}.time-table input{padding:3px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surfaceAlt);color:var(--text);font-size:12px;font-family:inherit}.time-table input[type=number]{width:55px;text-align:center}.time-table input[type=text]{width:100%}
.bar-h{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:3px}.bar-h-fill{height:100%;border-radius:3px}
.cfg-t{width:100%;border-collapse:collapse;font-size:12px}.cfg-t th{padding:7px 10px;text-align:left;font-size:10px;font-weight:500;color:var(--textMuted);border-bottom:2px solid var(--border)}.cfg-t td{padding:5px 8px;border-bottom:1px solid var(--border)}.cfg-t input,.cfg-t select{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-family:inherit}.cfg-t input[type=number]{width:75px;text-align:right}.cfg-t input[type=text]{width:100%}.cfg-t select{width:100%}
.del-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}.del-btn:hover{background:var(--dangerDim)}
.add-btn{padding:8px 20px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}.add-btn:hover{background:var(--accentDim);border-color:var(--accent)}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:var(--surface)}.drop-zone.over{border-color:var(--accent);background:var(--accentDim)}.drop-zone p{font-size:13px;color:var(--textMuted)}.drop-zone strong{color:var(--accent)}
.paste-area{width:100%;min-height:100px;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-family:inherit;resize:vertical;margin-top:10px}
.log{margin-top:10px;font-size:12px}.log-ok{color:var(--accent)}.log-it{color:var(--textMuted);font-size:11px;margin-left:12px}
.cat-sep{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;padding:12px 8px 4px;border:none!important}
.cat-sep td{border:none!important;padding:12px 8px 4px!important}
@media(max-width:700px){.grid-2{grid-template-columns:1fr}.grid-4{grid-template-columns:1fr 1fr}[style*="grid-template-columns:280px"]{grid-template-columns:1fr!important}[style*="grid-template-columns:2fr"]{grid-template-columns:1fr!important}}
@media print{.header,.nav{display:none!important}.section{display:block!important;page-break-after:always}}
</style>
</head>

.score-num{font-size:42px;font-weight:700}
.score-ok{color:#1d9e75}.score-wn{color:#ef9f27}.score-dg{color:#e31e2d}
h2{font-size:14px;font-weight:700;color:#e31e2d;border-bottom:2px solid #e31e2d;padding-bottom:4px;margin:16px 0 8px;text-transform:uppercase}
h3{font-size:12px;font-weight:700;color:#333;margin:10px 0 4px}
table{width:100%;border-collapse:collapse;margin-bottom:10px}
th{background:#e31e2d;color:white;padding:5px 8px;text-align:left;font-size:10px;font-weight:600}
td{padding:4px 8px;border-bottom:1px solid #ddd;font-size:11px}
tr:nth-child(even){background:#f9f9f9}
.cat-row td{background:#f0f0f0;font-weight:700;color:#e31e2d;font-size:11px;border:none;padding-top:10px}
.ok{color:#1d9e75;font-weight:700}.wn{color:#ef9f27;font-weight:700}.dg{color:#e31e2d;font-weight:700}
.action-box{border-left:3px solid;padding:6px 10px;margin-bottom:6px;font-size:11px}
.action-p1{border-color:#e31e2d;background:#fef0f0}.action-p2{border-color:#ef9f27;background:#fff8ee}
.notes-box{border:1px solid #ccc;padding:10px;min-height:60px;margin:6px 0;border-radius:4px;font-style:italic;color:#666}
.footer{text-align:center;margin-top:20px;padding-top:12px;border-top:2px solid #e31e2d;font-size:10px;color:#888}
.logo-text{font-size:18px;font-weight:700;color:#e31e2d}
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
.sig-box{border-top:1px solid #222;padding-top:6px;font-size:11px;min-height:50px}
@media print{body{padding:0}.page{padding:16px 24px}h2{page-break-after:avoid}}
</style></head><body>`;

  // HEADER
  html+=`<div class="header-bar"><div><h1>VISITE ANIMATION — Compte rendu</h1><div class="sub">EASYCASH</div></div><div style="text-align:right"><div style="font-size:14px;font-weight:700">${cur}</div><div style="font-size:11px">${vi.date||today}</div></div></div>`;
  html+=`<div class="page">`;

  // INFO
  html+=`<div class="info-grid">
    <div><strong>Magasin :</strong> ${cur}</div>
    <div><strong>Date :</strong> ${vi.date||today}</div>
    <div><strong>Franchisé :</strong> ${vi.signature||'_______________'}</div>
    <div><strong>Consultant :</strong> ${vi.consultant||'_______________'}</div>
  </div>`;

  // SCORE
  if(score!==null){
    const sc=score>=70?'score-ok':score>=45?'score-wn':'score-dg';
    html+=`<div class="score-box"><div>SCORE SANTÉ MAGASIN</div><div class="score-num ${sc}">${score}/100</div><div>${res.filter(r=>r.st==='ok').length} conformes · ${res.filter(r=>r.st==='wn').length} vigilances · ${res.filter(r=>r.st==='dg').length} actions</div></div>`;
  }

  // LA PERF — KPIs by category
  html+=`<h2>La Perf'</h2>`;
  html+=`<table><thead><tr><th>Indicateur</th><th>Valeur</th><th>Seuil OK</th><th>Seuil Vig.</th><th>Statut</th></tr></thead><tbody>`;
  let lc='';
  res.forEach(r=>{
    if(r.cat&&r.cat!==lc){lc=r.cat;html+=`<tr class="cat-row"><td colspan="5">${r.cat}</td></tr>`}
    const stClass=r.st==='ok'?'ok':r.st==='wn'?'wn':r.st==='dg'?'dg':'';
    const stText=r.st==='ok'?'✓ OK':r.st==='wn'?'⚠ Vigilance':r.st==='dg'?'✕ Action':r.val!=null?'—':'Non renseigné';
    html+=`<tr><td style="font-weight:500">${r.name}</td><td style="font-weight:600">${r.val!=null?(typeof r.val==='number'?r.val%1===0?r.val:r.val.toFixed(1):r.val)+' '+(r.unit||''):'—'}</td><td>${r.dir==='up'?'≥':'≤'} ${r.ok??'—'} ${r.unit||''}</td><td>${r.dir==='up'?'≥':'≤'} ${r.wn??'—'} ${r.unit||''}</td><td class="${stClass}">${stText}</td></tr>`;
  });
  html+=`</tbody></table>`;

  // CONSTATS
  html+=`<h2>Principaux constats</h2>`;
  if(vi.constats)html+=`<div class="notes-box">${vi.constats.replace(/\n/g,'<br>')}</div>`;
  else html+=`<div class="notes-box">À compléter lors de la visite...</div>`;

  // ACTIONS AUTOMATIQUES
  if(acts.length){
    html+=`<h2>Alertes automatiques</h2>`;
    acts.forEach(a=>{
      html+=`<div class="action-box ${a.st==='dg'?'action-p1':'action-p2'}"><strong>${a.st==='dg'?'P1':'P2'} — ${a.name}</strong> : ${a.val!=null?a.val:'—'}${a.unit||''}${a.action?' → '+a.action:''}</div>`;
    });
  }

  // PLAN D'ACTION
  html+=`<h2>Plan d'action</h2>`;
  if(pl.length){
    html+=`<table><thead><tr><th>N°</th><th>Prio</th><th>Constat</th><th>Action</th><th>Resp.</th><th>Échéance</th><th>Statut</th></tr></thead><tbody>`;
    pl.forEach((p,i)=>{
      html+=`<tr><td>${i+1}</td><td style="font-weight:700;color:${p.prio==='P1'?'#e31e2d':'#ef9f27'}">${p.prio}</td><td>${p.constat||''}</td><td>${p.action||''}</td><td>${p.resp||''}</td><td>${p.echeance||''}</td><td>${p.statut||'À faire'}</td></tr>`;
    });
    html+=`</tbody></table>`;
  }else{
    html+=`<table><thead><tr><th>N°</th><th>Prio</th><th>Constat</th><th>Action</th><th>Resp.</th><th>Échéance</th><th>Statut</th></tr></thead><tbody>`;
    for(let i=0;i<6;i++)html+=`<tr><td>${i+1}</td><td></td><td style="min-height:20px">&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>`;
    html+=`</tbody></table>`;
  }

  // ANALYSE PAR FAMILLE (zone libre)
  html+=`<h2>Analyse par famille</h2>`;
  html+=`<h3>Téléphonie</h3><div class="notes-box">Gamme / Prix / TLAC / Animation / Ventes additionnelles / Appels de stock...</div>`;
  html+=`<h3>Console / Console portable</h3><div class="notes-box">Gamme / Stock âgé / Merchandising / Sourcing...</div>`;
  html+=`<h3>Jeux vidéo / ACC jeux vidéo</h3><div class="notes-box">Best sellers / Vieux stock / Facing / Appels de stock...</div>`;
  html+=`<h3>Bijouterie - Horlogerie</h3><div class="notes-box">Poids marge / EasyBiz / Fonte / Taux de marge vs réseau...</div>`;
  html+=`<h3>Informatique / Tablette</h3><div class="notes-box">Gamme / Rotation / Achats extérieurs...</div>`;
  html+=`<h3>Autres familles</h3><div class="notes-box">Hifi / Photo / Audio-Vidéo / Électroménager / Livre-BD...</div>`;

  // REMARQUES EXTERNES
  html+=`<h2>Remarques externes</h2>`;
  html+=`<div class="notes-box">Outils réseau / Campagnes / Formations / Points divers...</div>`;

  // PROCHAIN RDV
  html+=`<h2>Suivi prochain rendez-vous</h2>`;
  if(vi.notes_prochain)html+=`<div class="notes-box">${vi.notes_prochain.replace(/\n/g,'<br>')}</div>`;
  else html+=`<div class="notes-box">Points à revoir au prochain passage...</div>`;

  // SIGNATURES
  html+=`<div class="sig-grid"><div class="sig-box"><strong>Le consultant :</strong><br>${vi.consultant||''}</div><div class="sig-box"><strong>Le franchisé :</strong><br>${vi.signature||''}</div></div>`;

  // FOOTER
  html+=`<div class="footer"><span class="logo-text">EASYCASH</span> — Compte rendu de visite animation — ${cur} — ${vi.date||today}</div>`;
  html+=`</div></body></html>`;

  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(()=>w.print(),500);
}

load();renderAll();
</script>
</body>
</html>
